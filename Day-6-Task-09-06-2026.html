    <script  >

// Function Declaration////
// A Function Declaration is a normal function created using the function keyword and a function name.



function greet(){
    console.log("Welcome Sameer");
}

greet();
//////////////


// Function Expression

// When a function is written inside a variable it is called a Function Expression.


let welcome = function(){
    console.log("Welcome Sameer");
};

welcome();
/////////////



// Named Function Expressio

// A function expression that has its own name.


let hello = function welcome(){

    console.log("Hello Sameer");

};

hello();
//////////////////////



// Anonymous Function Expression


// A function expression without any function name.


let w = function(){

    console.log("Hello Sameer Ali");

};

w();

//////////////////////////////


// Arrow Functions

// Arrow Functions are a shorter ES6 syntax for writing functions.

// normal
function add(a,b){

    return a+b;

}
// arrow
const addd = (a,b) => {

    return a+b;

};




// Recursive Functions

// A function that calls itself is called a Recursive Function.



function count(num){

    if(num === 0){
        return;
    }

    console.log(num);

    count(num-1);

}

count(5);

// Recursive Function
// ================================

function count(num) {

    if (num === 0) {
        return;
    }

    console.log(num);

    count(num - 1);
}

count(5);





function floor(level){

    if(level === 0){
        return;
    }

    console.log(level);

    floor(level-1);

}

floor(5);

function factorial(n){

    if(n === 1){
        return 1;
    }

    return n * factorial(n-1);
}

console.log(factorial(5));



function fibonacci(n){

    if(n <= 1){
        return n;
    }

    return fibonacci(n-1) + fibonacci(n-2);
}

console.log(fibonacci(6));
