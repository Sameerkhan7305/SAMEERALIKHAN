// A function that calls itself is called a Recursive Function.


// 1. Base Condition: When to Stop. 
// 2. Recursive Call: Calling itself again




function count(num){

    if(num === 0){
        return;
    }

    console.log(num);

    count(num - 1);

}

function factorial(n){

    if(n === 1){
        return 1;
    }

    return n * factorial(n-1);

}

function factorial1(n) {
