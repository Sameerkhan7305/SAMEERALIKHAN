// What is setInterval?  setInterval()

// clearInterval ?
// to stop Interval 


let offerTimer = setInterval(function () {console.log("Offer Running ");}, 1000);

clearInterval(offerTimer);


// Asynchronous JavaScript: JavaScript can run future work without stopping the current code.
//  setTimeout(): Runs the code once after a delay. 
//  setInterval(): Runs the code repeatedly after a fixed interval. 
//  clearTimeout(): Cancels the timeout.
//   clearInterval(): Stops the interva



let remainingSeconds = 10;

let countdownDisplay =
document.getElementById("countdownDisplay");

let countdownTimer = setInterval(function () {

    remainingSeconds--;

    countdownDisplay.textContent =
    remainingSeconds;

    if (remainingSeconds === 0) {

        clearInterval(countdownTimer);

    }

}, 1000);
