    <script>


// When an event occurs on a child element, that event travels to the parent element.
//  This process is called event bubbling.


        let outerBox =
document.getElementById("outerBox");

let buyButton =
document.getElementById("buyButton");

outerBox.addEventListener("click", function () {

    console.log("Outer Box Clicked");

});

buyButton.addEventListener("click", function () {

    console.log("Button Clicked");

});







let productCard =
document.getElementById("productCard");

let addCartButton =
document.getElementById("addCartButton");

productCard.addEventListener("click", function () {

    console.log("Product Card Opened");

});

addCartButton.addEventListener("click", function () {

    console.log("Product Added");

});




// Stopping
buyButton.addEventListener("click",

function (event) {

    event.stopPropagation();

    console.log("Button Clicked");

});







// Event Capturing


// When an event starts from the parent and travels to the child, that process is called event capturing.






let mainBox =
document.getElementById("mainBox");

let orderButton =
document.getElementById("orderButton");

mainBox.addEventListener(

    "click",

    function () {

        console.log("Main Box");

    },

    true

);

orderButton.addEventListener(

    "click",

    function () {

        console.log("Order Button");

    },

    true

);






// Event Delegation
// Event Delegation is a technique where a parent element handles events for its child elements using event bubbling.



let productList =
document.getElementById("productList");

productList.addEventListener("click", function (event) {

    console.log(event.target.textContent);

});







// Click Event

loginButton.addEventListener("click", function () {

    console.log("Button Clicked");

});



let searchInput =
document.getElementById("searchInput");

let resultText =
document.getElementById("resultText");

searchInput.addEventListener(
    "input",
    function () {

        resultText.textContent =
        searchInput.value;

    }
);


// Double Click Event


profileImage.addEventListener("dblclick", function () {

    console.log("Image Liked");

});




// Input Event

searchBox.addEventListener("input", function () {

    console.log("Typing...");

});




// Change Event

// keydown

gameInput.addEventListener(

            "Key Pressed"
        );

    }
);




// Throttling limits how often a function can execute within a given time period.


let isThrottleActive =
false;

window.addEventListener(
    "scroll",
    function () {

        if (
            isThrottleActive
        ) {
            return;
        }

        isThrottleActive =
        true;

        console.log(
            "Scroll Event"
        );

        setTimeout(
            function () {

                isThrottleActive =
                false;

            },
            2000
        );

    }
);







// Debouncing delays function execution until the user stops triggering the event.


let searchTimer;

let searchBox1 =
document.getElementById("searchBox");

searchBox1.addEventListener(
    "input",
    function () {

        clearTimeout(
            searchTimer
        );

        searchTimer =
        setTimeout(
            function () {

                console.log(
                    "Searching..."
                );

            },
            1000
        );

    }
);
